name: Notify governance collector

on:
  push:
    branches: [main]
    paths:
      - "codingLessonsLearnt.local.md"
      - "codingLessonsLearnt.md"

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to central pack repo
        env:
          GH_TOKEN: ${{ secrets.GOV_PACK_DISPATCH_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/HenrikFaul/dev-governance-pack/dispatches \
            -d @- <<'JSON'
          {
            "event_type": "lessons_updated",
            "client_payload": {
              "repo": "HenrikFaul/__REPO__",
              "sha": "${GITHUB_SHA}",
              "ref": "${GITHUB_REF}"
            }
          }
          JSON
